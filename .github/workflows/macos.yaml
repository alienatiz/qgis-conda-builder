---
name: 🍎 MacOS
on:
  push:
    branches:
      - test_2
  pull_request:
    branches:
      - test_2
  schedule:
    - cron: '40 7 * * *'
    
      
# TODO: probably create a nightly job

jobs:
  get-version:
    name: Get version
    runs-on: ubuntu-24.04
    outputs:
      QGIS_VERSION: ${{ steps.get-version.outputs.QGIS_VERSION }}
      QGIS_VERSION_SHORT: ${{ steps.get-version.outputs.QGIS_VERSION_SHORT }}
    steps:
      - uses: conda-incubator/setup-miniconda@v2
        with:
          miniconda-version: "latest"
      - name: 🌾 Get latest version
        id: get-version
        shell: bash
        run: |
          QGIS_VERSION=$(conda search -c conda-forge -f qgis | grep py311 | tail -n 1 | tr -s ' ' | cut -f 2 -d ' ')
          QGIS_VERSION_SHORT=$(echo $QGIS_VERSION | cut -d'.'  -f 1,2)
          echo QGIS_VERSION=$QGIS_VERSION >> $GITHUB_OUTPUT
          echo QGIS_VERSION_SHORT=$QGIS_VERSION_SHORT >> $GITHUB_OUTPUT
  
  package:
    name: Package for macOS
    runs-on: ${{ matrix.runner }}
    needs: get-version
    env:
      QGIS_VERSION: ${{ needs.get-version.outputs.QGIS_VERSION }}
      QGIS_VERSION_SHORT: ${{ needs.get-version.outputs.QGIS_VERSION_SHORT }}
      MICROMAMBA_PLATFORM: ${{ matrix.conda_platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: 'x86_64'
            conda_platform: 'osx-64'
            runner: macos-15-intel
          - architecture: 'arm64'
            conda_platform: 'osx-arm64'
            runner: macos-15
    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@v4

      - name: 🐣 Checkout Constructor
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: opengisch/constructor
          ref: qgis-bundling
          path: constructor

      - name: Prepare
        run: |
          sed -i '' "s/__ver__/$QGIS_VERSION/g" construct.yaml
          sed -i '' "s/__shortver__/$QGIS_VERSION_SHORT/g" construct.yaml


      - uses: conda-incubator/setup-miniconda@v2
        with:
          miniconda-version: "latest"
          activate-environment: "constructor"
          environment-file: "environment.yaml"

      - name: Package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
      
          $croot = Join-Path $env:HOME "conda-bld"
          $env:CONDA_BLD_PATH = $croot
          $mm = "micromamba-${{ matrix.conda_platform }}"
          Invoke-WebRequest `
            -Uri "https://github.com/mamba-org/micromamba-releases/releases/download/1.4.9-0/$mm" `
            -OutFile $mm
          & /bin/chmod +x $mm
      
          conda run -n constructor conda build --croot "$croot" ./constructor
          conda run -n constructor conda install -y --use-local constructor
          conda run -n constructor python -c "import shutil; print('constructor=', shutil.which('constructor'))"
          conda run -n constructor constructor --version
      
          $outDir = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          
          $workDir = $env:GITHUB_WORKSPACE
          $mmAbs  = Join-Path $workDir $mm
          
          conda run -n constructor constructor --debug -v --output-dir "$outDir" `
            --platform=${{ matrix.conda_platform }} --conda-exe="$mmAbs" "$workDir"
          
          $expected = "QGIS-$env:QGIS_VERSION-MacOSX-${{ matrix.architecture }}.pkg"
          $pkg = Get-ChildItem -Path $outDir -Filter *.pkg |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1
          
          if (-not $pkg) {
            Write-Host "No .pkg produced in $outDir"
            Write-Host "Contents of $outDir:"
            Get-ChildItem -Path $outDir -Recurse | Select-Object FullName, Length
            throw "No .pkg produced."
          }
          
          Copy-Item $pkg.FullName $expected -Force

      - name: 📦 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: QGIS-${{ env.QGIS_VERSION }}-MacOSX-${{ matrix.architecture }}
          path: QGIS-${{ env.QGIS_VERSION }}-MacOSX-${{ matrix.architecture }}.pkg

  release:
    name: Release
    runs-on: ubuntu-24.04
    needs:
      - get-version
      - package
    env:
      QGIS_VERSION: ${{ needs.get-version.outputs.QGIS_VERSION }}
      QGIS_VERSION_SHORT: ${{ needs.get-version.outputs.QGIS_VERSION_SHORT }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: QGIS-${{ env.QGIS_VERSION }}-MacOSX-x86_64
      - uses: actions/download-artifact@v4
        with:
          name: QGIS-${{ env.QGIS_VERSION }}-MacOSX-arm64
      - uses: ncipollo/release-action@v1
        with:
          name: ${{ env.QGIS_VERSION }}
          artifacts: "*.pkg"
          body: "See https://github.com/qgis/QGIS/releases"
          tag: ${{ env.QGIS_VERSION }}
          allowUpdates: true
