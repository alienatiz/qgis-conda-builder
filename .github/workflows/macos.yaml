---
name: 🍎 MacOS
on:
  push:
    branches:
      - test_2
  pull_request:
    branches:
      - test_2
  schedule:
    - cron: '40 7 * * *'
    
      
# TODO: probably create a nightly job

jobs:
  get-version:
    runs-on: ubuntu-24.04
    outputs:
      QGIS_VERSION: ${{ steps.get-version.outputs.QGIS_VERSION }}
      QGIS_VERSION_SHORT: ${{ steps.get-version.outputs.QGIS_VERSION_SHORT }}
    steps:
      - uses: conda-incubator/setup-miniconda@v2
        with:
          miniconda-version: "latest"

      - name: 🌾 Get latest macOS-compatible version (py311)
        id: get-version
        shell: bash
        run: |
          set -euo pipefail
          
          osx64=$(
            conda search -c conda-forge qgis --subdir osx-64 \
            | awk '$1=="qgis" && $3 ~ /^py311/ {print $2}' \
            | sort -u
          )
          
          arm64=$(
            conda search -c conda-forge qgis --subdir osx-arm64 \
            | awk '$1=="qgis" && $3 ~ /^py311/ {print $2}' \
            | sort -u
          )
          
          common=$(comm -12 <(printf "%s\n" "$osx64") <(printf "%s\n" "$arm64"))
          
          QGIS_VERSION=$(printf "%s\n" "$common" | sort -V | tail -n 1)
          
          if [[ -z "${QGIS_VERSION:-}" ]]; then
            echo "No common qgis version for py311 on osx-64 and osx-arm64" >&2
            echo "osx-64 candidates:" >&2; printf "%s\n" "$osx64" | tail -n 20 >&2
            echo "osx-arm64 candidates:" >&2; printf "%s\n" "$arm64" | tail -n 20 >&2
            exit 1
          fi
          
          QGIS_VERSION_SHORT=$(echo "$QGIS_VERSION" | cut -d'.' -f 1,2)
          echo "QGIS_VERSION=$QGIS_VERSION" >> "$GITHUB_OUTPUT"
          echo "QGIS_VERSION_SHORT=$QGIS_VERSION_SHORT" >> "$GITHUB_OUTPUT"
  
  package:
    name: Package for macOS
    runs-on: ${{ matrix.runner }}
    needs: get-version
    env:
      QGIS_VERSION: ${{ needs.get-version.outputs.QGIS_VERSION }}
      QGIS_VERSION_SHORT: ${{ needs.get-version.outputs.QGIS_VERSION_SHORT }}
      MICROMAMBA_PLATFORM: ${{ matrix.conda_platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: 'x86_64'
            conda_platform: 'osx-64'
            runner: macos-15-intel
          - architecture: 'arm64'
            conda_platform: 'osx-arm64'
            runner: macos-15
    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@v4

      - name: 🐣 Checkout Constructor
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: opengisch/constructor
          ref: qgis-bundling
          path: constructor

      - name: Prepare
        run: |
          sed -i '' "s/__ver__/$QGIS_VERSION/g" construct.yaml
          sed -i '' "s/__shortver__/$QGIS_VERSION_SHORT/g" construct.yaml


      - uses: conda-incubator/setup-miniconda@v2
        with:
          miniconda-version: "latest"
          activate-environment: "constructor"
          environment-file: "environment.yaml"

      - name: Package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          Set-StrictMode -Version Latest

          Set-Location $env:GITHUB_WORKSPACE
          $workDir = (Get-Location).Path

          $croot = Join-Path $env:HOME "conda-bld"
          $env:CONDA_BLD_PATH = $croot

          $mm = "micromamba-${{ matrix.conda_platform }}"
          Invoke-WebRequest -Uri "https://github.com/mamba-org/micromamba-releases/releases/download/1.4.9-0/$mm" -OutFile $mm
          & /bin/chmod +x $mm
          $mmAbs = Join-Path $workDir $mm
          & $mmAbs --version

          conda run -n constructor conda build --croot "$croot" ./constructor/recipe
          conda run -n constructor conda install -y --use-local constructor

          $outDir = Join-Path $workDir "dist"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $log = Join-Path $outDir "constructor.log"

          conda run -n constructor constructor --debug -v --output-dir "$outDir" `
            --platform=${{ matrix.conda_platform }} --conda-exe "$mmAbs" "$workDir" 2>&1 | Tee-Object -FilePath $log

          $code = $LASTEXITCODE
          if ($code -ne 0) {
            Write-Host ("constructor failed (exit {0})" -f $code)
            Write-Host ("--- tail of constructor.log ---")
            Get-Content $log -Tail 200
            exit $code
          }

          $pkg = Get-ChildItem -Path $outDir -Filter *.pkg -Recurse |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1
          
          if (-not $pkg) {
            $pkg = Get-ChildItem -Path $workDir -Filter *.pkg -Recurse |
              Sort-Object LastWriteTime -Descending | Select-Object -First 1
          }
          
          if (-not $pkg) {
            Write-Host ("No .pkg produced. dist listing:")
            Get-ChildItem -Path $outDir -Recurse | Select-Object FullName, Length
            Write-Host ("--- tail of constructor.log ---")
            Get-Content $log -Tail 200
            throw "No .pkg produced."
          }

          $expected = "QGIS-$env:QGIS_VERSION-MacOSX-${{ matrix.architecture }}.pkg"
          Copy-Item $pkg.FullName (Join-Path $workDir $expected) -Force

      - name: 📦 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: QGIS-${{ env.QGIS_VERSION }}-MacOSX-${{ matrix.architecture }}
          path: QGIS-${{ env.QGIS_VERSION }}-MacOSX-${{ matrix.architecture }}.pkg

      - name: 📦 Upload constructor log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: constructor-log-${{ matrix.architecture }}
          path: dist/constructor.log

  release:
    name: Release
    runs-on: ubuntu-24.04
    needs:
      - get-version
      - package
    env:
      QGIS_VERSION: ${{ needs.get-version.outputs.QGIS_VERSION }}
      QGIS_VERSION_SHORT: ${{ needs.get-version.outputs.QGIS_VERSION_SHORT }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: QGIS-${{ env.QGIS_VERSION }}-MacOSX-x86_64
      - uses: actions/download-artifact@v4
        with:
          name: QGIS-${{ env.QGIS_VERSION }}-MacOSX-arm64
      - uses: ncipollo/release-action@v1
        with:
          name: ${{ env.QGIS_VERSION }}
          artifacts: "*.pkg"
          body: "See https://github.com/qgis/QGIS/releases"
          tag: ${{ env.QGIS_VERSION }}
          allowUpdates: true
